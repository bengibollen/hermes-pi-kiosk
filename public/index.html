<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Pi Kiosk</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="status-panel" aria-label="Drive status">
        <div>
          <span class="label">GPS</span>
          <strong id="gps-status">No fix</strong>
        </div>
        <div>
          <span class="label">Drive</span>
          <strong id="drive-status">Idle</strong>
        </div>
        <div>
          <span class="label">Hermes</span>
          <strong id="hermes-status">Offline</strong>
        </div>
      </section>

      <section class="readout" aria-label="Current readout">
        <div class="speed">
          <span id="speed">0</span>
          <small>km/h</small>
        </div>
        <div class="details">
          <p><span>Location</span><strong id="location">Waiting for GPS</strong></p>
          <p><span>Trip</span><strong id="trip">Not started</strong></p>
          <p><span>Last update</span><strong id="last-update">Never</strong></p>
        </div>
      </section>

      <section class="actions" aria-label="Actions">
        <button class="primary" data-action="push-to-talk">Push to Talk</button>
        <button data-action="audio-test" id="audio-test">Audio Test</button>
        <button data-action="start-trip">Start Trip</button>
        <button data-action="mark-stop">Mark Stop</button>
        <button data-action="food">Food</button>
        <button data-action="overnight">Overnight</button>
        <button data-action="parking">Parking</button>
        <button data-action="play-audio" id="play-audio">Play Last</button>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
